name: Daily seepage research email

on:
  schedule:
    # 09:17 Asia/Shanghai = 01:17 UTC. Avoid GitHub Actions top-of-hour congestion.
    - cron: "17 1 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  send-research-email:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Send daily research note by email
        env:
          TZ: Asia/Shanghai
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD || secrets.QQ_SMTP_AUTH_CODE }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
        run: python scripts/daily_research_email.py
