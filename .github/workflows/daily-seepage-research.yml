name: Daily seepage research push

on:
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  push-research-note:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Post daily research note to GitHub issue manually only
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          ISSUE_NUMBER: "1"
          TZ: Asia/Shanghai
        run: python scripts/daily_research_push.py
